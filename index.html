<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <h1 class="app-title">💰 Expense &amp; Budget Visualizer</h1>
        <div class="header-controls">
          <button
            class="btn btn-theme-toggle"
            id="themeToggle"
            aria-label="Switch to dark mode"
            title="Toggle dark / light mode"
          >
            <span class="theme-icon" aria-hidden="true">🌙</span>
            <span class="theme-label">Dark</span>
          </button>
          <div class="balance-card">
            <span class="balance-label">Total Balance</span>
            <span class="balance-amount" id="totalBalance">$0.00</span>
          </div>
        </div>
      </div>
    </header>

    <main class="app-main">
      <!-- Left column: form + transaction list -->
      <section class="left-panel">

        <!-- Spending Limit -->
        <div class="card limit-card">
          <h2 class="card-title">💸 Spending Limit</h2>
          <div class="limit-bar">
            <label for="spendingLimit" class="limit-label">Monthly limit ($)</label>
            <input
              type="number"
              id="spendingLimit"
              class="limit-input"
              placeholder="e.g. 500.00"
              min="0.01"
              step="0.01"
              aria-label="Set a monthly spending limit"
            />
          </div>
          <!-- Warning banner — shown/hidden by JS -->
          <div class="spending-warning hidden" id="spendingWarning" role="alert" aria-live="polite">
            <span class="warning-icon" aria-hidden="true">⚠️</span>
            <span class="warning-text" id="warningText"></span>
          </div>
        </div>

        <!-- Add Transaction Form -->
        <div class="card">
          <h2 class="card-title">Add Transaction</h2>
          <form id="transactionForm" novalidate>
            <div class="form-group">
              <label for="itemName">Item Name</label>
              <input
                type="text"
                id="itemName"
                placeholder="e.g. Grocery shopping"
                autocomplete="off"
              />
              <span class="field-error" id="itemNameError"></span>
            </div>

            <div class="form-group">
              <label for="amount">Amount ($)</label>
              <input
                type="number"
                id="amount"
                placeholder="e.g. 25.00"
                min="0.01"
                step="0.01"
              />
              <span class="field-error" id="amountError"></span>
            </div>

            <div class="form-group">
              <label for="category">Category</label>
              <select id="category">
                <option value="">-- Select a category --</option>
                <option value="Food">🍔 Food</option>
                <option value="Transport">🚗 Transport</option>
                <option value="Fun">🎉 Fun</option>
              </select>
              <span class="field-error" id="categoryError"></span>
            </div>

            <button type="submit" class="btn btn-primary">Add Transaction</button>
          </form>
        </div>

        <!-- Transaction List -->
        <div class="card">
          <h2 class="card-title">
            Transactions
            <span class="transaction-count" id="transactionCount">0</span>
          </h2>

          <!-- Sort Bar -->
          <div class="sort-bar">
            <label for="sortSelect" class="sort-label">Sort by</label>
            <select id="sortSelect" class="sort-select" aria-label="Sort transactions">
              <option value="default">Default (newest first)</option>
              <option value="amount-asc">Amount (Low to High)</option>
              <option value="amount-desc">Amount (High to Low)</option>
              <option value="category-az">Category (A–Z)</option>
            </select>
          </div>

          <div class="transaction-list-wrapper">
            <ul class="transaction-list" id="transactionList">
              <!-- Populated by JS -->
            </ul>
            <p class="empty-state" id="emptyState">No transactions yet. Add one above!</p>
          </div>
        </div>

      </section>

      <!-- Right column: pie chart -->
      <section class="right-panel">
        <div class="card chart-card">
          <h2 class="card-title">Spending by Category</h2>
          <div class="chart-wrapper">
            <canvas id="spendingChart" aria-label="Pie chart showing spending distribution by category" role="img"></canvas>
          </div>
          <p class="chart-empty-state" id="chartEmptyState">Add transactions to see the chart.</p>

          <!-- Category legend / summary -->
          <div class="category-summary" id="categorySummary">
            <!-- Populated by JS -->
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>Data stored locally in your browser &mdash; no server required.</p>
    </footer>

    <script src="js/script.js"></script>pt>
  </body>
</html>
